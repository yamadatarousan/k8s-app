# kind 独自の Cluster リソースを定義するファイル。
kind: Cluster
# kind が解釈する設定 API バージョン。
apiVersion: kind.x-k8s.io/v1alpha4
# nodes にクラスタを構成する各 Docker コンテナノードを書く。
nodes:
  # 最初のノードは control-plane。API サーバーや scheduler など中核コンポーネントを持つ。
  - role: control-plane
    # kubeadmConfigPatches で kind が内部的に使う kubeadm 設定へ追記する。
    kubeadmConfigPatches:
      # 複数行文字列として kubeadm の InitConfiguration を埋め込む。
      - |
        # kubeadm 初期化時の設定種別。
        kind: InitConfiguration
        # ノード登録時の追加設定。
        nodeRegistration:
          # kubelet 起動引数を追加し、ノードラベルを初期状態から持たせる。
          kubeletExtraArgs:
            # ingress-nginx の kind 向け導入手順では、このラベルを持つノードに
            # コントローラーを載せる前提がある。
            # control-plane にこのラベルを付けておくと追加設定なしで ingress を動かしやすい。
            node-labels: "ingress-ready=true"
    # ホスト OS のポートと kind ノード内ポートを結び、外からアクセス可能にする。
    extraPortMappings:
      # ローカル学習ではブラウザから通常の HTTP / HTTPS ポートで触れる方が分かりやすい。
      # もし 80 / 443 がホストで使用中なら 8080 / 8443 に変更する。
      # kind ノード内の 80 番をホストの 80 番へ公開する。
      - containerPort: 80
        # Mac や Linux のブラウザから http://todo.local で直接開けるようにする。
        hostPort: 80
        # HTTP 通信なので TCP を使う。
        protocol: TCP
      # kind ノード内の 443 番もホストに公開して HTTPS 検証余地を残す。
      - containerPort: 443
        # ホストの 443 番へそのまま割り当てる。
        hostPort: 443
        # HTTPS も TCP 上で動く。
        protocol: TCP
  # 2 台目は worker。実運用を少し意識した最小構成として追加している。
  - role: worker
